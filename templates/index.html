<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ASLIYAT | Meme Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .left-panel {
            width: 40%;
            padding: 40px;
            background-color: #1a1a1a;
            border-right: 2px solid #D4AF37;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right-panel {
            width: 60%;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        h1 {
            color: #D4AF37;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        h3 {
            color: #b3b3b3;
            margin-top: 0;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cccccc;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #D4AF37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        button:hover {
            background-color: #F3CA41;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #555;
            color: #222;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: none;
            text-align: center;
            color: #D4AF37;
            font-size: 18px;
            margin-top: 20px;
        }
        .meme-preview-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            display: none;
        }
        .stats {
            margin-top: 25px;
            padding: 20px;
            background-color: #2a2a2a;
            border-radius: 8px;
            border-left: 4px solid #D4AF37;
            display: none;
            width: 80%;
        }
        .stats h4 { margin-top: 0; color: #D4AF37; }
        .stats p { margin: 5px 0; font-size: 14px; }
        .placeholder-text {
            color: #555;
            font-size: 24px;
            font-weight: 300;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <h1>THE ASLIYAT</h1>
        <h3>Automated Meme Generator</h3>

        <div class="input-group">
            <label for="topic">1. Enter a Topic (or leave blank for AI to pick)</label>
            <input type="text" id="topic" placeholder="e.g. Traffic, Corporate Life, Monday Morning">
        </div>

        <div class="input-group">
            <label>
                <input type="checkbox" id="fast_mode" checked> Fast Mode (Skip web research)
            </label>
        </div>

        <button id="generateBtn" onclick="generateMeme()">🔥 GENERATE MEME 🔥</button>

        <div class="loading" id="loadingText">
            🤖 AI is cooking... please wait (~30s)...
        </div>
    </div>

    <div class="right-panel">
        <h2 class="placeholder-text" id="placeholderMsg">👈 Enter a topic and click Generate</h2>
        <img id="memeImg" class="meme-preview-img" src="" alt="Generated Meme">
        
        <div class="stats" id="statsBox">
            <h4>📊 AI Generation Stats</h4>
            <p><b>Topic:</b> <span id="s_topic"></span></p>
            <p><b>QA Score:</b> <span id="s_score"></span>/10</p>
            <p><b>Time:</b> <span id="s_time"></span>s</p>
            <p style="margin-top:15px; color:#aaa; font-style:italic">"Expectation: <span id="s_exp"></span>"</p>
        </div>
    </div>
</div>

<script>
    async function generateMeme() {
        const btn = document.getElementById('generateBtn');
        const loading = document.getElementById('loadingText');
        const img = document.getElementById('memeImg');
        const placeholder = document.getElementById('placeholderMsg');
        const stats = document.getElementById('statsBox');
        
        const topic = document.getElementById('topic').value;
        const fast_mode = document.getElementById('fast_mode').checked;

        // UI Loading State
        btn.disabled = true;
        loading.style.display = 'block';
        img.style.display = 'none';
        stats.style.display = 'none';
        placeholder.style.display = 'none';

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic, fast_mode })
            });
            const result = await response.json();

            if (result.status === 'success') {
                img.src = '/image?path=' + encodeURIComponent(result.meme_path) + '&t=' + new Date().getTime();
                img.style.display = 'block';
                
                document.getElementById('s_topic').innerText = result.topic;
                document.getElementById('s_score').innerText = result.score;
                document.getElementById('s_time').innerText = result.time;
                document.getElementById('s_exp').innerText = result.expectation;
                stats.style.display = 'block';
            } else {
                alert("Error: " + result.message);
                placeholder.style.display = 'block';
            }
        } catch (e) {
            alert("Error connecting to server.");
            placeholder.style.display = 'block';
        }

        // Reset UI
        btn.disabled = false;
        loading.style.display = 'none';
    }
</script>

</body>
</html>
